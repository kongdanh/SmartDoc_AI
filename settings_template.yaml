# ═══════════════════════════════════════════════════════════
# SmartDoc AI — GraphRAG Settings Template
# LLM: OpenRouter (Free) | Embedding: HuggingFace (Local)
# ═══════════════════════════════════════════════════════════

completion_models:
  default_completion_model:
    type: litellm # Đổi từ openai sang litellm
    model_provider: openrouter
    model: "meta-llama/llama-3.3-70b-instruct"
    api_key: ${LLM_API_KEY}
    api_base: "https://openrouter.ai/api/v1" # Bắt buộc phải có
    model_supports_json: false
    # Thêm các dòng này để litellm nhận diện đúng
    model_list: 
      - model_name: "meta-llama/llama-3.3-70b-instruct"
        litellm_params:
          model: "openrouter/meta-llama/llama-3.3-70b-instruct"

embedding_models:
  default_embedding_model:
    type: litellm
    api_base: "https://openrouter.ai/api/v1"
    model: "openai/text-embedding-3-small"
    api_key: ${LLM_API_KEY}
    model_provider: openrouter
    retry:
      type: exponential_backoff
      max_retries: 10
      base_delay: 5.0
      jitter: true
      max_delay: 60.0
    rate_limit:
      type: sliding_window
      period_in_seconds: 60
      requests_per_period: 30

input:
  type: text
  storage:
    type: file
    base_dir: input
    encoding: utf-8

output:
  type: file
  base_dir: output

cache:
  type: json
  storage:
    type: file
    base_dir: cache

chunking:
  type: tokens
  size: 800
  overlap: 100

extract_graph:
  model: default_completion_model
  max_gleanings: 1
  strategy:
    type: graph_intelligence
    # QUAN TRỌNG: false để dùng text-based extraction thay vì JSON mode
    model_supports_json: false
  entity_types: [person, organization, location, event, concept]

summarize_descriptions:
  model: default_completion_model
  max_length: 500

community_reports:
  model: default_completion_model
  max_length: 1500
  max_input_length: 8000

parallelization:
  num_threads: 1

vector_store:
  type: lancedb
  db_uri: output/lancedb
  index_schema:
    text_unit_text:
      vector_size: ${EMBEDDING_DIMENSION}
    entity_description:
      vector_size: ${EMBEDDING_DIMENSION}
    community_full_content:
      vector_size: ${EMBEDDING_DIMENSION}